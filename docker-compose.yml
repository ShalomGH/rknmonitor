services:
  db:
    image: postgres:16-alpine
    container_name: rknmon_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-rknmon}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: ${POSTGRES_DB:-rknmon}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rknmon -d rknmon"]
      interval: 5s
      timeout: 3s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rknmon_app
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-rknmon}:${POSTGRES_PASSWORD:-changeme}@db:5432/${POSTGRES_DB:-rknmon}
      LOG_LEVEL: debug
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - .:/app
    depends_on:
      db:
        condition: service_healthy
    command: uvicorn rknmon.api.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  pgdata:
