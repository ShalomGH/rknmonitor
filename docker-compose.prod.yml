services:
  db:
    image: postgres:16-alpine
    container_name: rknmon_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-rknmon}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: ${POSTGRES_DB:-rknmon}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - rknmon

  app:
    image: rknmon:1.2.0
    container_name: rknmon_app
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-rknmon}:${POSTGRES_PASSWORD:-changeme}@db:5432/${POSTGRES_DB:-rknmon}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      API_KEY: ${API_KEY:-change-me-in-production}
      PROBE_INTERVAL_MINUTES: ${PROBE_INTERVAL_MINUTES:-10}
      EVENT_RETENTION_DAYS: ${EVENT_RETENTION_DAYS:-365}
    ports:
      - "0.0.0.0:23234:8000"
    depends_on:
      db:
        condition: service_healthy
    # Single worker: scheduler and prometheus_client metrics are in-process.
    # Multiple workers split metrics between processes and can make Grafana panels randomly empty.
    command: uvicorn rknmon.api.main:app --host 0.0.0.0 --port 8000 --workers 1
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - rknmon

  prometheus:
    image: prom/prometheus:v3.2.1
    container_name: rknmon_prometheus
    restart: unless-stopped
    volumes:
      - ./prometheus:/etc/prometheus:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
      - '--web.enable-lifecycle'
    networks:
      - rknmon
    # Не выставляем порты наружу — доступ только через reverse proxy / VPN
    # ports:
    #   - "127.0.0.1:9090:9090"

  grafana:
    image: grafana/grafana:11.6.0
    container_name: rknmon_grafana
    restart: unless-stopped
    ports:
      - "0.0.0.0:13000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_SERVER_ROOT_URL: ${GRAFANA_ROOT_URL:-http://localhost:3000}
      GF_DATE_FORMATS_DEFAULT_TIMEZONE: Asia/Omsk
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      GF_SECURITY_ALLOW_EMBEDDING: "false"
      POSTGRES_DB: ${POSTGRES_DB:-rknmon}
      POSTGRES_USER: ${POSTGRES_USER:-rknmon}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    # Доступ только через nginx — порт не выставляется
    # ports:
    #   - "0.0.0.0:3000:3000"
    networks:
      - rknmon

  nginx:
    image: nginx:1.27-alpine
    container_name: rknmon_nginx
    restart: unless-stopped
    ports:
      - "0.0.0.0:8443:8443"
    volumes:
      - ${NGINX_CONF_PATH:-./monitoring/nginx/nginx.conf.example}:/etc/nginx/conf.d/default.conf:ro
      - ./monitoring/nginx/ssl:/ssl:ro
    networks:
      - rknmon
    depends_on:
      - grafana
      - prometheus

volumes:
  pgdata:
  prometheus_data:
  grafana_data:

networks:
  rknmon:
    driver: bridge
