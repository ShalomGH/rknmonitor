services:
  db:
    image: postgres:16-alpine
    container_name: rknmon_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-rknmon}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: ${POSTGRES_DB:-rknmon}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    image: rknmon:1.0.0
    container_name: rknmon_app
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-rknmon}:${POSTGRES_PASSWORD:-changeme}@db:5432/${POSTGRES_DB:-rknmon}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      API_KEY: ${API_KEY:-change-me-in-production}
      PROBE_INTERVAL_MINUTES: ${PROBE_INTERVAL_MINUTES:-10}
      EVENT_RETENTION_DAYS: ${EVENT_RETENTION_DAYS:-365}
    ports:
      - "0.0.0.0:8000:8000"
    depends_on:
      db:
        condition: service_healthy
    command: uvicorn rknmon.api.main:app --host 0.0.0.0 --port 8000 --workers 2
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  pgdata:
