# Public agent install compose.
# Friend's machine runs ONLY this file. No build, no git clone, no Python.
#
# Image is pulled from GHCR (or any registry of your choice). To build and
# publish a fresh image:
#
#   docker build -f Dockerfile.agent -t ghcr.io/yourname/rknmon-agent:stable .
#   docker push ghcr.io/yourname/rknmon-agent:stable
#
# Override with env:
#   RKNMON_AGENT_IMAGE=ghcr.io/<owner>/rknmon-agent:stable
#
# The installer script writes /opt/rknmon-agent/.env.agent and .env.xray
# BEFORE invoking `docker compose up -d`, so secrets never live in the
# compose file itself.

services:
  rknmon-xray:
    image: teddysun/xray:latest
    container_name: ${XRAY_CONTAINER_NAME:-rknmon-xray}
    restart: unless-stopped
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        until [ -s /config/xray.generated.json ]; do
          echo "waiting for /config/xray.generated.json"
          sleep 1
        done
        exec xray run -config /config/xray.generated.json
    volumes:
      - xray-config:/config
    dns:
      - 1.1.1.1
      - 8.8.8.8

  rknmon-agent:
    image: ${RKNMON_AGENT_IMAGE:-ghcr.io/rknmon/rknmon-agent:stable}
    container_name: ${AGENT_NAME:-rknmon-agent}
    restart: unless-stopped
    env_file:
      - path: .env.agent
        required: true
      - path: .env.xray
        required: false
    network_mode: service:rknmon-xray
    depends_on:
      - rknmon-xray
    volumes:
      - xray-config:/config
    environment:
      XRAY_ENABLED: ${XRAY_ENABLED:-false}
      XRAY_CONFIG_PATH: /config/xray.generated.json
      XRAY_WAIT_FOR_SOCKS: ${XRAY_WAIT_FOR_SOCKS:-true}
      XRAY_READY_TIMEOUT_SECONDS: ${XRAY_READY_TIMEOUT_SECONDS:-90}
    command: ["--write-xray-config"]

volumes:
  xray-config:
